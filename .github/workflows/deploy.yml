name: Build and Deploy Hugo

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Leave empty for default deployment.'
        required: false
        default: ''
      build_future:
        description: 'Build posts with future dates'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ inputs.ref }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.155.1'
          extended: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Pages
        id: pages
        if: inputs.ref == '' || github.repository != 'Mirantis/t0-blog'
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build:generate

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            ${{ inputs.build_future == true && '--buildFuture' || '' }} \
            --baseURL "${{ steps.pages.outputs.base_url || '/' }}/"

      - name: Upload artifact
        if: inputs.ref == '' || github.repository != 'Mirantis/t0-blog'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        if: inputs.ref == '' || github.repository != 'Mirantis/t0-blog'
        uses: actions/deploy-pages@v4
