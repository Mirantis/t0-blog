<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Dynamic title for SEO -->
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>
<!-- Dynamic description for SEO -->
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Params.description }}{{ end }}">
{{- partialCached "head/css.html" . -}}
{{- partialCached "head/favicon.html" . -}}
{{- if .Params.mermaid }}{{ partial "head/mermaid.html" . }}{{ end -}}
{{- /* template "_internal/google_analytics.html" . */ -}}
<!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-iIWIpqKtTs4rDaO0UGc43.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>
<style>
  /* Wrap long lines instead of horizontal scroll */
  .highlight pre {
    white-space: pre-wrap !important;
    overflow-x: hidden !important;
    word-break: break-word !important;
  }
  /* Copy button on code blocks */
  .highlight {
    position: relative;
  }
  .highlight .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    padding: 0.25rem;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .highlight:hover .copy-btn {
    opacity: 1;
  }
  .highlight .copy-btn:hover {
    color: #fff;
  }
  .highlight .copy-btn svg {
    width: 1rem;
    height: 1rem;
    display: block;
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var clipboardIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3a2.25 2.25 0 0 0-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.334a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/></svg>';
    var checkIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>';
    document.querySelectorAll('.highlight').forEach(function(block) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.innerHTML = clipboardIcon;
      btn.title = 'Copy to clipboard';
      btn.addEventListener('click', function() {
        var code = block.querySelector('pre code') || block.querySelector('pre');
        navigator.clipboard.writeText(code.textContent).then(function() {
          btn.innerHTML = checkIcon;
          btn.style.color = '#22c55e';
          setTimeout(function() { btn.innerHTML = clipboardIcon; btn.style.color = ''; }, 1500);
        });
      });
      block.appendChild(btn);
    });
  });
</script>
